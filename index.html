<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="manifest.json">
    <title>Anki 遥控器 (通用网络版)</title>
    <style>
        :root {
            --font-size-card: 30px;
            --font-size-jp-text: 35px;
            --font-size-zhushi: 18px;
            --font-size-expression: 28px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 10px;
            background: #1a1a1a;
            color: #eee;
        }

        #card-area {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 300px;
            font-size: 1.1em;
            line-height: 1.6;
            overflow-y: auto;
            display: none; /* 默认隐藏，连接成功后显示 */
        }

        #card-area img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        #card-area video {
            max-width: 100%;
        }

        #status {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #888;
            font-size: 0.9em;
        }

        /* 设置按钮和页面样式 */
        #settings-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 100;
            display: none; /* 默认隐藏，加载卡片后显示 */
        }
        #settings-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a1a;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }
        .setup-group {
            margin-bottom: 15px;
        }
        .setup-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }
        .setup-group input[type="text"], .setup-group input[type="url"], .setup-group input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 1em;
            outline: none;
        }
        .setup-group input:focus {
            border-color: #4CAF50;
        }
        .setup-group .hint {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        #save-btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <button id="settings-btn" onclick="openSettings()">⚙️</button>

    <div id="settings-overlay">
        <h2 style="margin-bottom: 20px; text-align: center;">⚙️ 网络版配置</h2>
        <div class="setup-group">
            <label>AnkiConnect 地址</label>
            <input type="text" id="inp-anki-url" placeholder="192.168.x.x:8765 (将自动补全 http)">
            <div class="hint">可填局域网IP 或 公网HTTPS穿透链接</div>
        </div>
        <div class="setup-group">
            <label>AI 触发器地址</label>
            <input type="text" id="inp-ai-url" placeholder="192.168.x.x:8766 (将自动补全 /trigger-ai)">
        </div>
        <hr style="border-color: #333; margin: 20px 0;">
        <div class="setup-group">
            <label>卡片基础字号 (px)</label>
            <input type="number" id="inp-font-card" value="30">
        </div>
        <div class="setup-group">
            <label>日文字号 (px)</label>
            <input type="number" id="inp-font-jp" value="35">
        </div>
        <div class="setup-group">
            <label>中文字号 (px)</label>
            <input type="number" id="inp-font-zh" value="28">
        </div>
        <div class="setup-group">
            <label>注音/注释字号 (px)</label>
            <input type="number" id="inp-font-ruby" value="18">
        </div>
        <button id="save-btn" onclick="saveSettings()">保存并连接</button>
        <button onclick="closeSettings()" style="width:100%; padding:10px; margin-top:10px; background:transparent; color:#888; border:none; cursor:pointer; display:none;" id="cancel-btn">取消</button>
    </div>

    <div id="card-area">🔄 等待连接...</div>
    <div id="status"></div>

    <script>
        let ANKI_URL = '';
        let AI_EXT_URL = '';

        // --- 配置保存与加载逻辑 ---
        function openSettings() {
            const saved = localStorage.getItem('anki_remote_config');
            let config = saved ? JSON.parse(saved) : {};
            
            document.getElementById('inp-anki-url').value = config.ankiUrl || '';
            document.getElementById('inp-ai-url').value = config.aiUrl || '';
            document.getElementById('inp-font-card').value = config.fontCard || 30;
            document.getElementById('inp-font-jp').value = config.fontJp || 35;
            document.getElementById('inp-font-zh').value = config.fontZh || 28;
            document.getElementById('inp-font-ruby').value = config.fontRuby || 18;
            
            document.getElementById('cancel-btn').style.display = saved ? 'block' : 'none';
            document.getElementById('settings-overlay').style.display = 'block';
            document.getElementById('settings-btn').style.display = 'none';
            document.getElementById('card-area').style.display = 'none';
            document.getElementById('status').style.display = 'none';
        }

        function closeSettings() {
            document.getElementById('settings-overlay').style.display = 'none';
            document.getElementById('settings-btn').style.display = 'block';
            document.getElementById('card-area').style.display = 'block';
            // 不自动显示 status，交由原有逻辑处理
        }

        function saveSettings() {
            let ankiUrl = document.getElementById('inp-anki-url').value.trim();
            let aiUrl = document.getElementById('inp-ai-url').value.trim();

            if (ankiUrl && !/^https?:\/\//i.test(ankiUrl)) {
                ankiUrl = 'http://' + ankiUrl;
            }
            if (aiUrl && !/^https?:\/\//i.test(aiUrl)) {
                aiUrl = 'http://' + aiUrl;
            }
            if (aiUrl && !aiUrl.endsWith('/trigger-ai')) {
                aiUrl = aiUrl.replace(/\/$/, '') + '/trigger-ai';
            }

            const config = {
                ankiUrl: ankiUrl,
                aiUrl: aiUrl,
                fontCard: document.getElementById('inp-font-card').value,
                fontJp: document.getElementById('inp-font-jp').value,
                fontZh: document.getElementById('inp-font-zh').value,
                fontRuby: document.getElementById('inp-font-ruby').value
            };
            
            if (!config.ankiUrl) {
                alert("请输入 AnkiConnect 地址！");
                return;
            }
            
            localStorage.setItem('anki_remote_config', JSON.stringify(config));
            closeSettings();
            initApp();
        }

        // 联动输入：修改 Anki URL 时，自动推测 AI URL
        document.getElementById('inp-anki-url').addEventListener('input', function(e) {
            let ankiUrl = e.target.value.trim();
            if (ankiUrl && !/^https?:\/\//i.test(ankiUrl)) {
                ankiUrl = 'http://' + ankiUrl;
            }
            
            let aiUrlInp = document.getElementById('inp-ai-url');
            if (ankiUrl.includes(':8765') && !aiUrlInp.value) {
                aiUrlInp.value = ankiUrl.replace(':8765', ':8766') + '/trigger-ai';
            }
        });


        // --- 原有遥控器核心逻辑移植 ---

        async function anki(action, params = {}) {
            const res = await fetch(ANKI_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, params, version: 6 })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data.result;
        }

        let currentCard = null;
        let currentSide = 'question';

        // 处理媒体文件：把 img src 替换为 base64，并提取 fields 里的音频
        async function resolveMedia(html, side) {
            // 移除 Anki 自动生成的占位符 [anki:play:...]
            html = html.replace(/\[anki:play:[a-z]:\d+\]/g, '');

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const mediaTags = doc.querySelectorAll('img[src], video[src], source[src]');

            for (let el of mediaTags) {
                let src = el.getAttribute('src');
                if (!src || src.startsWith('data:') || src.startsWith('http')) continue;

                try {
                    let filename = decodeURIComponent(src);
                    const base64 = await anki('retrieveMediaFile', { filename: filename });
                    if (base64 && !base64.startsWith('data:')) {
                        const ext = filename.split('.').pop().toLowerCase();
                        const mimeMap = {
                            mp4: 'video/mp4', webm: 'video/webm',
                            jpg: 'image/jpeg', jpeg: 'image/jpeg',
                            png: 'image/png', gif: 'image/gif', svg: 'image/svg+xml', webp: 'image/webp'
                        };
                        const mime = mimeMap[ext] || 'application/octet-stream';
                        el.setAttribute('src', `data:${mime};base64,${base64}`);
                    } else if (base64) {
                        el.setAttribute('src', base64);
                    }
                } catch (e) { console.error("图片加载失败", src, e); }
            }

            let finalHtml = doc.body.innerHTML;

            // 从字段中提取音频 [sound:xxx.mp3]
            if (currentCard && currentCard.fields) {
                let audioHtml = '<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 5px;">';
                let audioFiles = [];
                for (let key in currentCard.fields) {
                    let val = currentCard.fields[key].value;
                    let matches = val.match(/\[sound:(.*?)\]/g);
                    if (matches) {
                        for (let m of matches) {
                            let filename = m.match(/\[sound:(.*?)\]/)[1];
                            if (!audioFiles.includes(filename)) audioFiles.push(filename);
                        }
                    }
                }

                for (let filename of audioFiles) {
                    try {
                        const base64 = await anki('retrieveMediaFile', { filename: filename });
                        if (base64) {
                            const ext = filename.split('.').pop().toLowerCase();
                            const mimeMap = { mp3: 'audio/mpeg', ogg: 'audio/ogg', wav: 'audio/wav', m4a: 'audio/mp4', opus: 'audio/ogg' };
                            const mime = mimeMap[ext] || 'audio/mpeg';
                            // 仅在首次加载（正面）时自动播放
                            let autoplay = side === 'question' ? 'autoplay' : '';
                            audioHtml += `<audio ${autoplay} src="data:${mime};base64,${base64}"></audio>`;
                        }
                    } catch (e) { console.error("音频加载失败", filename, e); }
                }
                audioHtml += '</div>';
                finalHtml += audioHtml;
            }

            return finalHtml;
        }

        async function renderCard(side) {
            if (!currentCard) return;
            currentSide = side;
            const statusEl = document.getElementById('status');
            const cardEl = document.getElementById('card-area');
            statusEl.textContent = '加载媒体中...';

            let rawHtml = side === 'question' ? currentCard.question : currentCard.answer;

            // ----- 核心修复：绕过 Anki 渲染缓存 -----
            if (currentCard.fields) {
                try {
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = rawHtml;
                    for (let fieldName in currentCard.fields) {
                        let fieldData = currentCard.fields[fieldName];
                        let targetElements = tempDiv.querySelectorAll(`[data-field="${fieldName}"]`);
                        targetElements.forEach(el => {
                            el.innerHTML = fieldData.value;
                        });
                    }
                    rawHtml = tempDiv.innerHTML;
                } catch (e) {
                    console.error("DOM 解析覆盖失败:", e);
                }
            }
            // ----------------------------------------

            let css = currentCard.css || '';

            let resolvedHtml = await resolveMedia(rawHtml, side);

            // 移除可能由快捷编辑插件生成的 contenteditable 属性，防止弹出键盘
            resolvedHtml = resolvedHtml.replace(/contenteditable="?[^">]*"?/gi, '');

            cardEl.innerHTML = `
        <style>${css}</style>
        <style>
            /* 注入自定义样式覆盖模板默认行为，强行隔离防止原模板CSS错误污染 */
            body, html { background-color: #1a1a1a !important; color: #8B8878 !important; }
            #card-area { background-color: #1a1a1a !important; }
            /* 将卡片背景改为全透明，跟随外层的深灰色夜间背景 */
            .card { background-color: transparent !important; color: #8B8878 !important; }
            
            /* 强制应用我们在顶部定义的手机端专属字体大小 */
            .card, .card.nightMode { font-size: var(--font-size-card) !important; }
            .jp-text { font-size: var(--font-size-jp-text) !important; }
            .zhushi { font-size: var(--font-size-zhushi) !important; }
            .expression { font-size: var(--font-size-expression) !important; }

            .copy-btn { display: none !important; }
            button[onclick*="pycmd"] { display: none !important; }
            .replay-button { display: none !important; }
        </style>
        <div class="card nightMode">
            ${resolvedHtml}
        </div>
    `;
            statusEl.textContent = '✅ 就绪';
        }

        async function loadCard(retries = 3) {
            const statusEl = document.getElementById('status');
            const cardEl = document.getElementById('card-area');
            try {
                statusEl.textContent = '加载中...';
                let card = null;
                for (let i = 0; i < retries; i++) {
                    try {
                        card = await anki('guiCurrentCard');
                        break; // 成功则跳出循环
                    } catch (err) {
                        // 拦截复习状态暂离错误（通常是因为Anki后台在重建队列）
                        if (err.message && err.message.includes('Gui review is not currently active') && i < retries - 1) {
                            console.warn(`Anki 队列重建中，等待 500ms 后重试 (${i + 1}/${retries})...`);
                            await new Promise(r => setTimeout(r, 500));
                            continue;
                        }
                        throw err; // 其他错误或重试耗尽则抛出
                    }
                }

                if (!card || card.error) {
                    cardEl.innerHTML = '📭 当前没有正在学习的卡片';
                    statusEl.textContent = '';
                    currentCard = null;
                    return;
                }

                // 如果卡片没有切换（比如生成完AI后重新拉取），则保持当前停留在正面还是背面
                let targetSide = 'question';
                if (currentCard && currentCard.cardId === card.cardId) {
                    targetSide = currentSide;
                }

                currentCard = card;
                await renderCard(targetSide);
            } catch (err) {
                cardEl.innerHTML = `⚠️ 错误: ${err.message}`;
                statusEl.textContent = '❌ 连接失败';
            }
        }

        async function showAnswer() {
            try {
                await anki('guiShowAnswer'); // 电脑端也同步翻面
                if (currentCard) {
                    await renderCard('answer');
                }
            } catch (err) {
                document.getElementById('status').textContent = '显示答案失败: ' + err.message;
            }
        }

        async function rate(ease) {
            if (currentSide === 'question') {
                await showAnswer();
                return;
            }
            try {
                await anki('guiAnswerCard', { ease });
                await loadCard();  // 自动加载下一张
            } catch (err) {
                document.getElementById('status').textContent = '评分失败: ' + err.message;
            }
        }

        function replayAudioOnPhone() {
            const audios = document.querySelectorAll('audio');
            if (audios.length > 0) {
                audios.forEach(a => {
                    a.currentTime = 0;
                    a.play().catch(e => console.log("播音失败:", e));
                });
                document.getElementById('status').textContent = '🔊 手机重播中';
                setTimeout(() => document.getElementById('status').textContent = '✅ 就绪', 1500);
            } else {
                document.getElementById('status').textContent = '⚠️ 当前没有音频';
            }
        }

        async function triggerAI() {
            if (currentSide === 'question') {
                return;
            }
            document.getElementById('status').textContent = '🤖 AI 触发中，请稍候 (可能需要几秒钟)...';
            try {
                await fetch(AI_EXT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                // 此时由于后端加入了阻塞等待机制，只要 fetch 返回，就说明 Anki 数据库已绝对更新完毕
                document.getElementById('status').textContent = '✅ 已生成，正在刷新卡片...';
                await loadCard();
                document.getElementById('status').textContent = '✅ AI 刷新完成';

            } catch (e) {
                document.getElementById('status').textContent = 'AI 触发失败 (请确保插件已更新并重启 Anki): ' + e.message;
            }
        }

        // 全局操作时间戳，用于触控和键盘防连点 (500ms)
        let lastActionTime = 0;

        // 实体键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            // 防误触：如果有输入框聚焦则忽略
            const tag = e.target.tagName.toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;

            const key = e.key.toLowerCase();
            const validKeys = ['1', '3', '4', '6', 'r', ' ', 'enter'];
            if (!validKeys.includes(key)) return;

            e.preventDefault(); // 防止按空格时页面向下滚动

            const now = Date.now();
            if (now - lastActionTime < 500) return;
            lastActionTime = now;

            if (key === '1' || key === '6') {
                rate(1);
            } else if (key === '3' || key === ' ' || key === 'enter') {
                rate(3);
            } else if (key === 'r' || key === '4') {
                replayAudioOnPhone();
            }
        });

        // 使用 true 在捕获阶段拦截，防止事件先到达卡片内部的插件
        document.addEventListener('click', function (e) {
            // 如果点的是设置面板里面的东西，或者是设置按钮，不要拦截！
            if (e.target.closest('#settings-overlay') || e.target.closest('#settings-btn')) {
                return;
            }

            // 忽略目标为链接或多媒体的点击，避免影响卡片原生交互
            const tag = e.target.tagName.toLowerCase();
            if (tag === 'a' || tag === 'audio' || tag === 'video' || tag === 'button' || e.target.closest('a')) {
                return;
            }

            // 阻止事件向下传递和默认行为，彻底切断卡片内“快捷编辑”插件的点击监听
            e.stopPropagation();
            e.preventDefault();

            const now = Date.now();
            if (now - lastActionTime < 500) {
                return; // 防连点节流
            }
            lastActionTime = now;

            const x = e.clientX;
            const y = e.clientY;
            const width = window.innerWidth;
            const height = window.innerHeight;

            const col = Math.floor(x / (width / 3)); // 0, 1, 2
            const row = Math.floor(y / (height / 3)); // 0, 1, 2

            // 计算小键盘数字 (789 在顶，123 在底)
            const numpad = (2 - row) * 3 + col + 1;

            switch (numpad) {
                case 1:
                case 3:
                    rate(3);
                    break;
                case 4:
                case 6:
                    rate(1);
                    break;
                case 2:
                    replayAudioOnPhone();
                    break;
                case 5:
                    if(AI_EXT_URL) {
                        triggerAI();
                    } else {
                        document.getElementById('status').textContent = '⚠️ 未配置 AI 触发器地址';
                    }
                    break;
                case 7:
                case 8:
                case 9:
                    // 暂不做任何操作
                    break;
            }
        }, true);

        // 页面加载
        window.pycmd = async function (cmd) {
            // 拦截卡片原生的 AI 按钮
            if (cmd.includes('aiGenerate') || cmd.includes('CF_aiGenerate')) {
                if(AI_EXT_URL) {
                    await triggerAI();
                } else {
                    document.getElementById('status').textContent = '⚠️ 未配置 AI 触发器地址';
                }
                return;
            }
            document.getElementById('status').textContent = '⚠️ 无法远程触发卡片按钮 (AnkiConnect 不支持 pycmd)';
            console.warn("被拦截的 pycmd 指令:", cmd, "原因: AnkiConnect 官方接口不支持远程执行插件命令。");
        };

        // --- 应用初始化 ---
        function initApp() {
            const saved = localStorage.getItem('anki_remote_config');
            if (saved) {
                const config = JSON.parse(saved);
                ANKI_URL = config.ankiUrl;
                AI_EXT_URL = config.aiUrl;
                document.documentElement.style.setProperty('--font-size-card', config.fontCard + 'px');
                document.documentElement.style.setProperty('--font-size-jp-text', config.fontJp + 'px');
                document.documentElement.style.setProperty('--font-size-expression', config.fontZh + 'px');
                document.documentElement.style.setProperty('--font-size-zhushi', config.fontRuby + 'px');
                
                closeSettings();
                loadCard();
            } else {
                openSettings();
            }
        }

        // 启动应用
        initApp();

    </script>
</body>
</html>
