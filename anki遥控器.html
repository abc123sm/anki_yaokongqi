<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Anki 遥控器</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 10px; background: #1a1a1a; color: #eee; }
    #card-area {
        background: #2a2a2a;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        min-height: 300px;
        font-size: 1.1em;
        line-height: 1.6;
        overflow-y: auto;
    }
    #card-area img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    #card-area video { max-width: 100%; }
    .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    button {
        padding: 15px;
        font-size: 1.1em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    }
    .show-ans { background: #f39c12; color: white; grid-column: span 2; }
    .again { background: #e74c3c; color: white; }
    .good { background: #2ecc71; color: white; }
    .audio { background: #3498db; color: white; }
    .ai { background: #9b59b6; color: white; }
    .refresh { background: #555; color: white; grid-column: span 2; margin-top: 5px; }
    #status { text-align: center; margin-top: 10px; color: #888; font-size: 0.9em; }
    /* 卡片内部的样式会通过 <style> 注入 */
</style>
</head>
<body>

<div id="card-area">🔄 连接中...</div>

<div class="buttons">
    <button class="show-ans" onclick="showAnswer()">👁️ 显示答案</button>
    <button class="again" onclick="rate(1)">❌ Again (1)</button>
    <button class="good" onclick="rate(3)">✅ Good (3)</button>
    <button class="audio" onclick="replayAudioOnPhone()">🔊 手机播音</button>
    <button class="ai" onclick="triggerAI()">🤖 AI 生成</button>
    <button class="refresh" onclick="loadCard()">🔄 刷新卡片</button>
</div>

<div id="status"></div>

<script>
const ANKI_URL = 'http://127.0.0.1:8765';  // 改成你电脑的实际IP

async function anki(action, params = {}) {
    const res = await fetch(ANKI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, params, version: 6 })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.result;
}

let currentCard = null;

// 处理媒体文件：把 img src 替换为 base64，并提取 fields 里的音频
async function resolveMedia(html, side) {
    // 移除 Anki 自动生成的占位符 [anki:play:...]
    html = html.replace(/\[anki:play:[a-z]:\d+\]/g, '');

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const mediaTags = doc.querySelectorAll('img[src], video[src], source[src]');

    for (let el of mediaTags) {
        let src = el.getAttribute('src');
        if (!src || src.startsWith('data:') || src.startsWith('http')) continue;
        
        try {
            let filename = decodeURIComponent(src);
            const base64 = await anki('retrieveMediaFile', { filename: filename });
            if (base64 && !base64.startsWith('data:')) {
                const ext = filename.split('.').pop().toLowerCase();
                const mimeMap = { 
                    mp4:'video/mp4', webm:'video/webm',
                    jpg:'image/jpeg', jpeg:'image/jpeg',
                    png:'image/png', gif:'image/gif', svg:'image/svg+xml', webp:'image/webp' 
                };
                const mime = mimeMap[ext] || 'application/octet-stream';
                el.setAttribute('src', `data:${mime};base64,${base64}`);
            } else if (base64) {
                el.setAttribute('src', base64);
            }
        } catch(e) { console.error("图片加载失败", src, e); }
    }
    
    let finalHtml = doc.body.innerHTML;

    // 从字段中提取音频 [sound:xxx.mp3]
    if (currentCard && currentCard.fields) {
        let audioHtml = '<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 5px;">';
        let audioFiles = [];
        for (let key in currentCard.fields) {
            let val = currentCard.fields[key].value;
            let matches = val.match(/\[sound:(.*?)\]/g);
            if (matches) {
                for (let m of matches) {
                    let filename = m.match(/\[sound:(.*?)\]/)[1];
                    if (!audioFiles.includes(filename)) audioFiles.push(filename);
                }
            }
        }
        
        for (let filename of audioFiles) {
            try {
                const base64 = await anki('retrieveMediaFile', { filename: filename });
                if (base64) {
                    const ext = filename.split('.').pop().toLowerCase();
                    const mimeMap = { mp3:'audio/mpeg', ogg:'audio/ogg', wav:'audio/wav', m4a:'audio/mp4', opus:'audio/ogg' };
                    const mime = mimeMap[ext] || 'audio/mpeg';
                    // 仅在首次加载（正面）时自动播放
                    let autoplay = side === 'question' ? 'autoplay' : '';
                    audioHtml += `<audio controls ${autoplay} src="data:${mime};base64,${base64}" style="max-width: 100%; height: 40px;"></audio>`;
                }
            } catch(e) { console.error("音频加载失败", filename, e); }
        }
        audioHtml += '</div>';
        finalHtml += audioHtml;
    }

    return finalHtml;
}

async function renderCard(side) {
    if (!currentCard) return;
    const statusEl = document.getElementById('status');
    const cardEl = document.getElementById('card-area');
    statusEl.textContent = '加载媒体中...';
    
    let rawHtml = side === 'question' ? currentCard.question : currentCard.answer;
    let css = currentCard.css || '';
    
    const resolvedHtml = await resolveMedia(rawHtml, side);
    
    cardEl.innerHTML = `
        <style>${css}</style>
        <div style="color:#aaa; margin-bottom:15px; font-size:0.85em; text-align: left; border-bottom: 1px solid #444; padding-bottom: 5px;">
            📚 ${currentCard.deckName} | 📝 ${currentCard.modelName} | 👁️ ${side === 'question' ? '正面' : '背面'}
        </div>
        <div class="card">
            ${resolvedHtml}
        </div>
    `;
    statusEl.textContent = '✅ 就绪';
}

async function loadCard() {
    const statusEl = document.getElementById('status');
    const cardEl = document.getElementById('card-area');
    try {
        statusEl.textContent = '加载中...';
        const card = await anki('guiCurrentCard');
        if (!card || card.error) {
            cardEl.innerHTML = '📭 当前没有正在学习的卡片';
            statusEl.textContent = '';
            currentCard = null;
            return;
        }
        currentCard = card;
        await renderCard('question');
    } catch (err) {
        cardEl.innerHTML = `⚠️ 错误: ${err.message}`;
        statusEl.textContent = '❌ 连接失败';
    }
}

async function showAnswer() {
    try {
        await anki('guiShowAnswer'); // 电脑端也同步翻面
        if (currentCard) {
            await renderCard('answer');
        }
    } catch (err) {
        document.getElementById('status').textContent = '显示答案失败: ' + err.message;
    }
}

async function rate(ease) {
    try {
        await anki('guiAnswerCard', { ease });
        await loadCard();  // 自动加载下一张
    } catch (err) {
        document.getElementById('status').textContent = '评分失败: ' + err.message;
    }
}

function replayAudioOnPhone() {
    const audios = document.querySelectorAll('audio');
    if (audios.length > 0) {
        audios.forEach(a => {
            a.currentTime = 0;
            a.play().catch(e => console.log("播音失败:", e));
        });
        document.getElementById('status').textContent = '🔊 手机重播中';
        setTimeout(() => document.getElementById('status').textContent = '✅ 就绪', 1500);
    } else {
        document.getElementById('status').textContent = '⚠️ 当前没有音频';
    }
}

async function triggerAI() {
    try {
        await anki('eval', { script: 'mw.reviewer.web.eval("pycmd(\'CF_aiGenerate\')")' });
        document.getElementById('status').textContent = '🤖 AI 处理中...';
        setTimeout(async () => {
            await loadCard();
            document.getElementById('status').textContent = '✅ AI 完成';
        }, 1000);
    } catch(e) {
        document.getElementById('status').textContent = 'AI 触发失败: ' + e.message;
    }
}

// 页面加载
loadCard();
</script>
</body>
</html>
